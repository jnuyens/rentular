version: "3.8"

# Alternative: Use this instead of docker-compose.yml for PostgreSQL
# docker compose -f docker-compose.postgres.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rentular}
      POSTGRES_USER: ${DB_USER:-rentular}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rentular}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-ARGS", "pg_isready", "-U", "rentular"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
  redis_data:
